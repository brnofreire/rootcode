services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www
      - backend_vendor:/var/www/vendor
    env_file:
      - ./backend/.env
    command: php artisan serve --host=0.0.0.0 --port=8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
      - WATCHPACK_POLLING=true
    command: sh -c "npm run dev -- -H 0.0.0.0"
    depends_on:
      - backend

volumes:
  backend_vendor:
  frontend_node_modules:
